<!DOCTYPE html>
<html>
 
<style>
  html, body, #content {
    height: 100%;
    margin: 0;
    padding: 0;
  }
</style>  

<head>

  <meta charset="UTF-8">
  <title>Entregas de Contadores</title>

  <script
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"

    data-sap-ui-resourceroots='{"contadores": "/"}'>
  </script>

  <script>
    sap.ui.getCore().attachInit(function () {
      new sap.ui.core.ComponentContainer({
        name: "contadores",
        settings: { id: "contadores" },
        async: true
      }).placeAt("content")
    })
  </script>

</head>
<body class="sapUiBody">

  <div id="content"></div>
</body>
</html>
